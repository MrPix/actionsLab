name: My First Workflow
on:
 push:
   branches: [main]
   paths-ignore: [.github/**]
 pull_request:
    branches: [ main ]
 schedule:
   - cron: "1,31 8-18 * * 1-5"
 workflow_dispatch:
   inputs:
     environment:
       description: 'Environment to deploy to'
       type: environment
       required: true

jobs:
  FirstJob:
    runs-on: ubuntu-latest
    permissions: read-all
    steps:
      - run: |
         echo "🎉 The job was triggered by event: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
         echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ." >> $GITHUB_STEP_SUMMARY
      - uses: actions/checkout@v7.0.0

      - name: List files in the repository
        run: |
          echo "The repository ${{ github.repository }} contains the following files:"
          tree
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: FirstJob
    environment: test
    steps:
      - run: echo "🧪 Testing..."

  load-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: FirstJob
    environment: load-Test
    steps:
      - run: |
          echo "🧪 Testing..."
          sleep 15

  prod:
    runs-on: ubuntu-latest
    needs: [test, load-test]
    environment:
      name: prod
      url: https://writeabout.net
    if: github.event.inputs.environment == 'prod'
    steps:
      - run: |
          echo "🚀 Step 1..."
          sleep 10
      - run: |
          echo "🚀 Step 2..."
          sleep 10
      - run: |
          echo "🚀 Step 3..."
          sleep 10
      - run: |
          echo "🚀 Step 4..."
          sleep 10
      - run: |
          echo "🚀 Step 5..."
          sleep 10
